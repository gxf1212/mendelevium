name: Build and Deploy Jekyll Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build Jekyll Site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Normalize collection asset URLs
        run: |
          find _site -type f -regextype posix-extended \
            -regex '.*\.html\.(png|jpg|jpeg|webp|gif|svg|pdf|docx|pptx|xlsx|md|py|bib|bst|cls|tex|itp|sh|json|txt|ya?ml|toml)$' \
            -print0 | while IFS= read -r -d '' file; do
              ext="${file##*.}"
              target="${file%.html.$ext}.$ext"
              if [ -e "$target" ]; then
                rm "$file"
              else
                mv "$file" "$target"
              fi
            done
          find _site -type f -iregex '.*\.\(pdf\|docx\|doc\|pptx\|ppt\|xlsx\|xls\)$' \
            -delete
          du -sh _site
          site_size_mb=$(du -sm _site | cut -f1)
          if [ "$site_size_mb" -gt 950 ]; then
            echo "Pages artifact is still too large: ${site_size_mb} MB. Please compress images or remove large static files."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
